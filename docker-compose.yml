version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: egypt_postgres
    environment:
      POSTGRES_DB: egypt_finance
      POSTGRES_USER: egfinanceuser
      POSTGRES_PASSWORD: egpassword123
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - egypt_net

  mongodb:
    image: mongo:6
    container_name: egypt_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - egypt_net

  airflow:
      image: apache/airflow:2.8.0
      container_name: egypt_airflow
      environment:
        AIRFLOW__CORE__EXECUTOR: LocalExecutor
        AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://egfinanceuser:egpassword123@postgres:5432/egypt_finance
        AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
        AIRFLOW__WEBSERVER__SECRET_KEY: supersecretkey123
      ports:
        - "8080:8080"
      volumes:
        - ./airflow/dags:/opt/airflow/dags
        - .:/opt/egypt_project
        - ./venv:/opt/egypt_project/venv
      depends_on:
        - postgres
      networks:
        - egypt_net
      command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@egypt.com && airflow webserver & airflow scheduler & wait"

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    ports:
      - "9870:9870"
    environment:
      - CLUSTER_NAME=egypt
    env_file:
      - ./hadoop/hadoop.env
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    networks:
      - egypt_net

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    depends_on:
      - namenode
    env_file:
      - ./hadoop/hadoop.env
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    networks:
      - egypt_net

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive_server
    ports:
      - "10000:10000"
      - "10002:10002"
    env_file:
      - ./hadoop/hadoop.env
    environment:
      HIVE_CORE_CONF_javax_jdo_option_ConnectionURL: 'jdbc:postgresql://postgres/metastore'
    depends_on:
      - namenode
      - datanode
      - postgres
    networks:
      - egypt_net

volumes:
  postgres_data:
  mongo_data:
  hadoop_namenode:
  hadoop_datanode:

networks:
  egypt_net:
    driver: bridge